<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator App</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="calculator-shell">
      <header>
        <h1>Calculator</h1>
        <p>FastAPI + static UI calculator</p>
      </header>

      <section class="display-panel">
        <input
          id="expression"
          type="text"
          inputmode="decimal"
          placeholder="Enter expression"
        />
        <div id="result" class="result">Result will appear here</div>
      </section>

      <section class="history-panel">
        <div class="history-header">
          <h2>History</h2>
          <button id="clear-history" type="button">Clear</button>
        </div>
        <ul id="history" class="history-list">
          <li class="history-empty">No history yet.</li>
        </ul>
      </section>

      <section class="button-grid" aria-label="Calculator keypad">
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button data-value="/">÷</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="*">×</button>
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="-">−</button>
        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button id="clear">C</button>
        <button data-value="+">+</button>
        <button data-value="(">(</button>
        <button data-value=")">)</button>
        <button data-value="%">%</button>
        <button id="calculate">=</button>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
